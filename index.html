<!DOCTYPE html>
<html lang="kg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чемпион Оюну</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app">

  <div id="startScreen" class="screen active">
    <h1 class="main-title">🎮 Чемпион Оюну</h1>
    <p class="subtitle">Атыңызды киргизиңиз:</p>
    <input type="text" id="username" placeholder="Атыңыз" class="input-name">
    <button id="startBtn" class="btn start-btn">Баштоо</button>
  </div>

  <div id="menu" class="screen">
    <h2 class="lesson-title">📚 Сабак тандаңыз:</h2>
    <div id="lessonButtons" class="lesson-grid"></div>
  </div>

  <div id="game" class="screen">
    <h2 id="lessonTitle" class="lesson-header"></h2>

    <div id="progressContainer">
      <div id="progressBar"></div>
    </div>

    <p id="question" class="question"></p>
    <div id="answers" class="answers"></div>

    <div class="character-box">
      <div id="character">👩‍🏫</div>
      <p id="characterSpeech"></p>
    </div>

    <p id="timer" class="timer"></p>
  </div>

  <div id="finalResult" class="screen"></div>

</div>
<script src="script.js" defer></script>
</body>
</html>
